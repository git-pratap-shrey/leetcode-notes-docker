services:
  n8n:
    image: pratapshrey/leetcode-notes:latest
    restart: always
    ports:
      - "5678:5678"
    environment:
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      # - N8N_LISTEN_ADDRESS=0.0.0.0
      # - N8N_SECURE_COOKIE=false
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  n8n_data:
